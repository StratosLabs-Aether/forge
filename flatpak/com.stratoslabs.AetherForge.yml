id: com.stratoslabs.AetherForge
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: aether-forge
finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=x11
  - --socket=pulseaudio
  - --share=network
  - --device=dri
  - --filesystem=home
  - --talk-name=org.freedesktop.Notifications
modules:
  - name: aether-forge
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin
      env:
        CARGO_HOME: /run/build/aether-forge/cargo
        WEBKIT_DISABLE_COMPOSITING_MODE: '1'
    build-commands:
      - cargo install tauri-cli --version "^2"
      - cd src-tauri && cargo build --release
      - install -Dm755 target/release/aether-forge /app/bin/aether-forge
      - install -Dm644 ../share/metainfo/com.stratoslabs.AetherForge.metainfo.xml /app/share/metainfo/com.stratoslabs.AetherForge.metainfo.xml
      - install -Dm644 ../share/icons/hicolor/256x256/apps/com.stratoslabs.AetherForge.png /app/share/icons/hicolor/256x256/apps/com.stratoslabs.AetherForge.png
      - install -Dm644 ../share/applications/com.stratoslabs.AetherForge.desktop /app/share/applications/com.stratoslabs.AetherForge.desktop
    sources:
      - type: dir
        path: ../../
