name: Release Aether Forge
on:
  push:
    tags: ['v*']

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu]
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build Forge
        run: cargo tauri build --target ${{ matrix.target }}
        working-directory: src-tauri
      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: forge-appimage-${{ matrix.target }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: forge-deb-${{ matrix.target }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
      - name: Upload rpm
        uses: actions/upload-artifact@v4
        with:
          name: forge-rpm-${{ matrix.target }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/rpm/*.rpm

  release:
    needs: [build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
